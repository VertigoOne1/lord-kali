# All *.toml files in ~/.config/lord-kali/ are loaded in lexicographic order.
# Rules from earlier files match first (first-match-wins priority).
# Split configs like 00-base.toml, 10-bash.toml, 20-groups.toml are supported.

[log]
enabled = true
path = "~/.local/state/lord-kali/hook.jsonl"

# Central approval TUI (opt-in; default off). When enabled AND `lord-kali watch`
# is running, ask/pass-through calls are routed to that TUI instead of Claude
# Code's own per-terminal prompt. With no TUI running, behavior is unchanged.
# [approval]
# enabled = true
# live_rules = "99-live.toml"            # file the TUI appends allow/deny-always rules to
# state_dir = "~/.local/state/lord-kali" # queue + heartbeat live here
# Destructive commands (rm, dd, Remove-Item, …) always default to tight, path-specific
# rules in the TUI; list extra commands here to give them the same treatment.
# guardrail_commands = ["terraform", "kubectl"]

[bash]
allowed_commands = [
  "awk", "basename", "cat", "cut", "date", "df", "diff", "dirname",
  "base64", "cd", "du", "echo", "env", "fd", "file", "find", "free", "grep",
  "head", "htop", "id", "jq", "less", "ls", "lsof", "md5sum", "more",
  "od", "pgrep", "ping", "printenv", "printf", "ps", "pwd", "realpath", "rg",
  "sed", "sha256sum", "sort", "stat", "tail", "tee", "top", "tr", "tree",
  "true", "type", "uname", "uniq", "uptime", "wc", "whereis", "which",
  "whoami", "xargs", "xxd",
]

[[bash.rules]]
command = "cargo"
args = "{fmt,build,test}{, **}"
decision = "allow"

[[bash.rules]]
command = "git"
args = "{status,diff,log,show,branch,tag,remote,fetch,blame,shortlog,describe,rev-parse,ls-files,ls-tree,cat-file,reflog,stash list,stash show,add}{, **}"
decision = "allow"

[[bash.rules]]
command = "rm"
args = "-rf **"
decision = "deny"
reason = "No recursive force deletes"

[[bash.rules]]
command = "rm"
decision = "ask"
reason = "rm can be dangerous, please ask."

[[bash.rules]]
command = "rmdir"
decision = "ask"
reason = "rmdir can be dangerous, please ask."

[[bash.rules]]
command = "npm"
decision = "deny"
reason = "Use pnpm instead of npm."

[[bash.rules]]
command = "npx"
decision = "deny"
reason = "Use pnpm dlx instead of npx."

[[bash.rules]]
command = "pnpm"
args = "{validate,lint,run validate,run lint}{, **}"
decision = "allow"

[[bash.rules]]
command = "pnpm"
args = "{ls,why,info,view}{, **}"
decision = "allow"

[[bash.rules]]
command = "docker"
args = "logs{, **}"
decision = "allow"

# allow to fetch any URL without a query parameter
[[web-fetch.rules]]
url = "/[^?]*/"
decision = "allow"

# MCP tool gating. Rules key on the full tool name (mcp__<server>__<tool>); glob and
# /regex/ both work. Matching is on the name only — the tool's structured arguments are
# never inspected (they are shown read-only in the approval TUI). First match wins, so a
# specific `ask`/`deny` must precede a broader `allow`.
[[mcp.rules]]
tool = "mcp__playwright__browser_fill_form"
decision = "ask"                       # eyeball form fills in the TUI even if the rest is allowed
[[mcp.rules]]
tool = "mcp__playwright__*"
decision = "allow"

# Per-rule project scoping: restrict a rule to specific directories
#
# [[bash.rules]]
# command = "cargo"
# args = "publish{, **}"
# decision = "deny"
# projects = ["~/projects/my-rust-project"]

# Group-scoped overrides: all rules in a group inherit its projects.
# Rules within a group can add extra projects (union with group's).
#
# [[group]]
# projects = ["~/projects/my-rust-project", "~/projects/other"]
#
# [group.bash]
# allowed_commands = ["rustup"]
#
# [[group.bash.rules]]
# command = "cargo"
# args = "publish{, **}"
# decision = "deny"
# reason = "Do not publish from these projects"
#
# [[group.bash.rules]]
# command = "make"
# decision = "allow"
# projects = ["~/projects/third"]
# # effective projects = group's + ["~/projects/third"]
#
# [[group.web-fetch.rules]]
# url = "https://internal.example.com/**"
# decision = "allow"
