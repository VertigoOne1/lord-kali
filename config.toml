[log]
enabled = true
path = "~/.local/state/lord-kali/hook.jsonl"

[bash]
allowed_commands = [
  "awk", "basename", "cat", "cut", "date", "df", "diff", "dirname",
  "base64", "cd", "du", "echo", "env", "fd", "file", "find", "free", "grep",
  "head", "htop", "id", "jq", "less", "ls", "lsof", "md5sum", "more",
  "od", "ping", "printenv", "printf", "ps", "pwd", "realpath", "rg",
  "sed", "sha256sum", "sort", "stat", "tail", "tee", "top", "tr", "tree",
  "true", "type", "uname", "uniq", "uptime", "wc", "whereis", "which",
  "whoami", "xargs", "xxd",
]

[[bash.rules]]
command = "cargo"
args = "/(fmt|build|test)( .*)?/"
decision = "allow"

[[bash.rules]]
command = "rm"
args = "-rf *"
decision = "deny"
reason = "No recursive force deletes"

[[bash.rules]]
command = "rm"
decision = "ask"
reason = "rm can be dangerous, please ask."

[[bash.rules]]
command = "rmdir"
decision = "ask"
reason = "rmdir can be dangerous, please ask."

[[bash.rules]]
command = "npm"
decision = "deny"
reason = "Use pnpm instead of npm."

[[bash.rules]]
command = "pnpm"
args = "/(run )?(validate|lint).*/"
decision = "allow"

[[bash.rules]]
command = "pnpm"
args = "/(ls|why|info|view) .*/"
decision = "allow"

[[bash.rules]]
command = "docker"
args = "/logs .*/"
decision = "allow"

# allow to fetch any URL without a query parameter
[[web-fetch.rules]]
url = "/[^?]*/"
decision = "allow"
